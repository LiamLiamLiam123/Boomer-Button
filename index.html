<!DOCTYPE html>
<html>
<head>
    <title>Boomer Detector</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: black;
            color: red;
        }

        button {
            padding: 25px 40px;
            font-size: 25px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🧓 BOOMER DETECTOR</h1>

    <button onclick="boom()">SCAN</button>

    <h2 id="result"></h2>

    <!-- FIXED AUDIO TAG -->
    <audio id="sound" src="https://www.myinstants.com/media/sounds/vine-boom.mp3"></audio>

    <script>
        function boom() {
            // always say this
            document.getElementById("result").innerText = "🚨 BOOMER DETECTED 🚨";

            // play vine boom
            document.getElementById("sound").play();

            // TEXT TO SPEECH (real screaming)
            let msg = new SpeechSynthesisUtterance("BOOMER BOOMER BOOMER");
            msg.volume = 1;
            msg.rate = 1;
            msg.pitch = 0.8;

            speechSynthesis.speak(msg);
        }
    </script>

</body>
</html>
